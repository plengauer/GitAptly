name: Update Package Repository

on:
  release:
    types: published
  push:
    branches:
      - main
    paths:
      - .github/workflows/update_package_repository.yml

concurrency:
  group: update-package-repository
      
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: plengauer/create-package-repository@633a11ea69db35f9a34064f643c7763dd768088f # v0.3.4
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
