name: Update Package Repository

on:
  release:
    types: published
  push:
    branches:
      - main
    paths:
      - .github/workflows/update_package_repository.yml

concurrency:
  group: update-package-repository
      
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: plengauer/create-package-repository@v0.1.0
      - uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: .
      - uses: actions/deploy-pages@v5.0.0
